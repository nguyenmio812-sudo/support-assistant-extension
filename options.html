<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Cài đặt — Support Assistant</title>
<style>
  body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; max-width: 480px; margin: 40px auto; color: #111827; }
  h2 { font-size: 16px; margin-top: 28px; }
  label { display: block; font-size: 13px; margin: 10px 0 4px; color: #374151; }
  input { width: 100%; padding: 8px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 13px; }
  button { margin-top: 20px; background: #5b21b6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; }
  .hint { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .saved { color: #16a34a; font-size: 13px; margin-top: 10px; display: none; }
</style>
</head>
<body>
  <h1>⚙️ Cài đặt Support Assistant</h1>

  <h2>Claude API</h2>
  <label>API Key</label>
  <input type="password" id="claudeApiKey" placeholder="sk-ant-..." />
  <div class="hint">Khuyến nghị: dùng key qua backend proxy nội bộ thay vì lưu trực tiếp ở đây khi lên production (xem PROPOSAL.md).</div>

  <h2>Jira</h2>
  <label>Base URL</label>
  <input type="text" id="jiraBaseUrl" placeholder="https://yourteam.atlassian.net" />
  <label>Email</label>
  <input type="text" id="jiraEmail" placeholder="agent@company.com" />
  <label>API Token</label>
  <input type="password" id="jiraApiToken" />
  <label>Project Key</label>
  <input type="text" id="jiraProjectKey" placeholder="SUP" />

  <button id="saveBtn">Lưu cài đặt</button>
  <div class="saved" id="savedMsg">Đã lưu ✓</div>

  <script src="options.js"></script>
</body>
</html>
